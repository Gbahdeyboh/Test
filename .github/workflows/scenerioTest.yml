name: Automated API tests using Postman CLI

on: push

jobs:
  automated-api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Postman CLI
        run: |
          curl -o- "https://dl-cli.pstmn.io/install/linux64.sh" | sh
      - name: Login to Postman CLI
        run: postman login --with-api-key ${{ secrets.POSTMAN_API_KEY }}
      - name: Run API tests
        run: |
          postman collection run "21505573-ce0ce6af-7e8a-4ccd-a48f-361ea8630da3" -e "21505573-e0092250-6b11-49cf-bf63-763ae64b0b13"
      - name: Run Postman collection with CLI + HTML reporters
        run: |
          mkdir -p reports
          postman collection run "21505573-ce0ce6af-7e8a-4ccd-a48f-361ea8630da3" -e "21505573-e0092250-6b11-49cf-bf63-763ae64b0b13" \
            -r cli,html \
            --reporter-html-export "reports/postman-report.html"
      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: postman-html-report
          path: reports/postman-report.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload report for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports   # folder containing postman-report.html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
